name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check cortex/

      - name: Test
        run: uv run pytest tests/ -v

      - name: Bump version
        id: version
        run: |
          python scripts/version_bump.py
          VERSION=$(python -c "import ast; print(ast.literal_eval(open('cortex/version.py').read().split('=')[1].strip()))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compile release artifacts
        run: uv run cortex compile --skip-validate --dist ./dist

      - name: Install lychee
        env:
          LYCHEE_VERSION: "0.23.0"
        run: |
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Validate Markdown links
        run: lychee --offline --include-fragments --no-progress dist/

      - name: Build package
        run: uv build --out-dir dist/pkg

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pkg/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "$VERSION" \
            --title "Cortex $VERSION" \
            --generate-notes \
            dist/cortex-*.tar.gz dist/pkg/*
