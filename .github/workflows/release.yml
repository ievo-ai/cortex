name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: uv run python build.py --tag "$TAG" --dist ./dist

      - name: Install lychee
        env:
          LYCHEE_VERSION: "0.23.0"
        run: |
          curl -sSfL "https://github.com/lycheeverse/lychee/releases/download/lychee-v${LYCHEE_VERSION}/lychee-x86_64-unknown-linux-gnu.tar.gz" | tar xz
          sudo mv lychee /usr/local/bin/
          lychee --version

      - name: Validate Markdown links
        run: lychee --offline --include-fragments --no-progress dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "Cortex $TAG" \
            --notes "Cortex kernel release $TAG" \
            "dist/cortex-${TAG}.tar.gz"
